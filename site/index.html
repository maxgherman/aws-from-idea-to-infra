<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR Preview</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 3rem 1.5rem; }
      .card { max-width: 52rem; margin: 0 auto; border: 1px solid rgba(127,127,127,.35); border-radius: 14px; padding: 1.25rem 1.25rem; }
      h1 { margin: 0 0 .5rem; font-size: 1.6rem; }
      p { margin: .5rem 0; line-height: 1.5; }
      code { padding: .15rem .35rem; border-radius: 6px; background: rgba(127,127,127,.2); }
      .muted { opacity: .75; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>PR Preview</h1>
      <p class="muted">Deployed by GitHub Actions via OIDC + CDK.</p>
      <p>If you can see this page, the per-PR static website preview is live.</p>
      <p class="muted">Next: replace <code>site/</code> with your real build output.</p>
    </div>
  </body>
</html>
