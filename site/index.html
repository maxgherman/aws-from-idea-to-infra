<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR preview</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 48rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }

      h1 {
        margin-top: 0;
      }

      button {
        padding: 0.7rem 1rem;
        cursor: pointer;
      }

      pre {
        padding: 1rem;
        background: #f4f4f5;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>Preview environment</h1>
    <p>This page can call the preview API for this pull request.</p>

    <button id="call-api" type="button">Call API</button>
    <p id="status">Ready.</p>
    <pre id="result" hidden></pre>

    <script src="./config.js"></script>
    <script>
      const button = document.getElementById('call-api');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const apiUrl = window.__PREVIEW_API_URL__;

      if (!apiUrl) {
        button.disabled = true;
        status.textContent = 'API URL is not configured.';
      }

      button.addEventListener('click', async () => {
        status.textContent = 'Calling API...';
        result.hidden = true;

        try {
          const response = await fetch(apiUrl, {
            method: 'GET',
            headers: {
              accept: 'application/json',
            },
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          status.textContent = 'Success.';
          result.textContent = JSON.stringify(data, null, 2);
          result.hidden = false;
        } catch (error) {
          status.textContent = `Request failed: ${error.message}`;
          result.textContent = '';
        }
      });
    </script>
  </body>
</html>
